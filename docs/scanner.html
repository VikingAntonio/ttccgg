<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://vikingtcg.xyz/favi.png">
    <title>Vikingdev TCG</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script async src="https://docs.opencv.org/4.5.2/opencv.js" type="text/javascript"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-color: #00d2ff;
        }

        body.public-body {
            background: radial-gradient(circle at top, #1a1a2e 0%, #0f0f1a 100%) !important;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            padding: 20px;
        }

        .scanner-layout {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .scanner-header {
            text-align: center;
            margin-bottom: 10px;
        }

        .scanner-header h1 {
            font-size: 2rem;
            margin-bottom: 5px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .destination-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            align-items: end;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .custom-select-wrapper {
            display: flex;
            gap: 10px;
        }

        select, input {
            background: rgba(0,0,0,0.3) !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            color: white !important;
            padding: 12px !important;
            border-radius: 12px !important;
            font-size: 14px !important;
            outline: none !important;
            width: 100%;
        }

        .btn-plus {
            background: var(--accent-color) !important;
            border: none !important;
            color: #000 !important;
            width: 45px;
            height: 45px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        .btn-plus:hover { transform: scale(1.05); }

        .viewport-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            border: 2px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        #video-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #file-preview {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
        }

        .scan-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .scan-frame {
            width: 100%;
            height: 100%;
            border: 2px solid var(--accent-color);
            border-radius: 20px;
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.7);
            position: relative;
        }

        .corner-tl { position: absolute; top: -5px; left: -5px; width: 20px; height: 20px; border-top: 4px solid var(--accent-color); border-left: 4px solid var(--accent-color); border-radius: 8px 0 0 0; }
        .corner-tr { position: absolute; top: -5px; right: -5px; width: 20px; height: 20px; border-top: 4px solid var(--accent-color); border-right: 4px solid var(--accent-color); border-radius: 0 8px 0 0; }
        .corner-bl { position: absolute; bottom: -5px; left: -5px; width: 20px; height: 20px; border-bottom: 4px solid var(--accent-color); border-left: 4px solid var(--accent-color); border-radius: 0 0 0 8px; }
        .corner-br { position: absolute; bottom: -5px; right: -5px; width: 20px; height: 20px; border-bottom: 4px solid var(--accent-color); border-right: 4px solid var(--accent-color); border-radius: 0 0 8px 0; }

        .scanning-line {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: var(--accent-color);
            box-shadow: 0 0 15px var(--accent-color);
            animation: scan-anim 2s infinite ease-in-out;
            opacity: 0;
        }

        @keyframes scan-anim {
            0% { top: 5%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 95%; opacity: 0; }
        }

        .scanner-active .scanning-line { opacity: 1; }

        .status-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            font-weight: 600;
        }

        .status-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #ff4757;
            display: inline-block;
            margin-right: 10px;
            transition: 0.3s;
        }
        .status-ready .status-dot { background: #2ed573; box-shadow: 0 0 10px #2ed573; }
        .status-working .status-dot {
            background: #ffa500;
            box-shadow: 0 0 10px #ffa500;
            animation: pulse-orange 1s infinite;
        }

        @keyframes pulse-orange {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        .controls-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            width: 100%;
            flex-wrap: wrap;
        }

        .btn-main {
            flex: 1;
            min-width: 140px;
            padding: 14px;
            border-radius: 14px;
            border: none;
            font-weight: 800;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary { background: var(--accent-color); color: #000; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .btn-secondary { background: rgba(255,255,255,0.1); color: white; }
        .btn-secondary:hover { background: rgba(255,255,255,0.15); }

        .back-btn {
            position: fixed;
            top: 25px; left: 25px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            width: 45px; height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            z-index: 100;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }

        .dev-warning-banner {
            background: #ff4757;
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.3);
            width: 100%;
            max-width: 600px;
            animation: slideDown 0.5s ease-out;
            z-index: 1001;
        }
        @keyframes slideDown {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .close-warning {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 0 5px;
            line-height: 1;
        }

        .result-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            transform: translateX(120%);
            background: #2f3136;
            border-left: 4px solid #5865f2;
            padding: 12px 16px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.24);
            z-index: 2000;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            width: 300px;
        }

        .result-toast.active { transform: translateX(0); }
        .result-toast.error { border-left-color: #f04747; }
        .result-toast.success { border-left-color: #43b581; }

        .toast-img-box {
            width: 40px; height: 56px;
            background: #202225;
            border-radius: 4px;
            overflow: hidden;
            flex-shrink: 0;
        }

        @media (max-width: 600px) {
            .scanner-layout { padding-top: 50px; }
            .back-btn { top: 15px; left: 15px; width: 35px; height: 35px; }
            .destination-grid { grid-template-columns: 1fr; }
        }

        /* Detection Zones - Hidden as per user request */
        .code-zone {
            position: absolute;
            border: 1px dashed rgba(0, 210, 255, 0.2); /* Much more subtle or hidden */
            border-radius: 4px;
            pointer-events: none;
            transition: 0.3s;
            display: none; /* Hidden */
            align-items: center;
            justify-content: center;
        }
        .code-zone::after {
            content: attr(data-label);
            position: absolute;
            top: -18px;
            left: 0;
            font-size: 10px;
            color: var(--accent-color);
            text-transform: uppercase;
            font-weight: 700;
            white-space: nowrap;
            background: rgba(0,0,0,0.5);
            padding: 2px 4px;
            border-radius: 3px;
            display: none; /* Hidden */
        }
    </style>
</head>
<body class="public-body">
    <button class="back-btn" onclick="location.href='admin.html'"><i class="fas fa-arrow-left"></i></button>

    <div class="scanner-layout">
        <div id="dev-warning" class="dev-warning-banner" style="display:none;">
            <div style="display: flex; align-items: center; gap: 12px;">
                <i class="fas fa-exclamation-triangle"></i>
                <span style="font-weight: 600; font-size: 14px;">Esta función está en desarrollo y aún no está en funcionamiento</span>
            </div>
            <button class="close-warning" onclick="this.parentElement.style.display='none'">&times;</button>
        </div>

        <div class="scanner-header">
            <h1>Scanner de Cartas</h1>
            <p style="color: #aaa;">Encuentra y añade cartas automáticamente</p>
        </div>

        <div class="glass-panel">
            <div class="destination-grid">
                <div class="form-group">
                    <label>Tipo de Juego</label>
                    <select id="select-game-type">
                        <option value="yugioh">Yu-Gi-Oh!</option>
                        <option value="pokemon">Pokémon</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Añadir a</label>
                    <select id="select-target-type">
                        <option value="album">Álbum</option>
                        <option value="deck">Deck</option>
                    </select>
                </div>
                <div class="form-group">
                    <label id="dest-label">Seleccionar Álbum</label>
                    <div class="custom-select-wrapper">
                        <select id="select-dest"></select>
                        <button class="btn-plus" id="btn-new-dest" title="Crear Nuevo"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <div class="viewport-container" id="scanner-viewport">
            <video id="video-preview" autoplay playsinline muted></video>
            <canvas id="overlay-canvas" style="position: absolute; top:0; left:0; width:100%; height:100%; pointer-events: none; z-index: 10;"></canvas>
            <img id="file-preview" src="">
            <div class="scan-overlay">
                <div class="scan-frame">
                    <div class="corner-tl"></div>
                    <div class="corner-tr"></div>
                    <div class="corner-bl"></div>
                    <div class="corner-br"></div>
                    <div class="scanning-line"></div>
                </div>
            </div>
        </div>

        <div class="glass-panel status-panel" id="status-container">
            <div style="display: flex; align-items: center;">
                <span class="status-dot"></span>
                <span id="status-text">Motor Listo</span>
            </div>
            <div id="detected-code" style="color: var(--accent-color); font-family: monospace; font-size: 1rem; font-weight: bold;"></div>
        </div>

        <div class="controls-row">
            <button id="btn-toggle-scan" class="btn-main btn-primary">
                <i class="fas fa-camera"></i> Cámara
            </button>
            <button id="btn-upload" class="btn-main btn-secondary">
                <i class="fas fa-upload"></i> Subir Imagen
            </button>
            <button id="btn-manual" class="btn-main btn-secondary">
                <i class="fas fa-keyboard"></i> Manual
            </button>
        </div>
    </div>

    <input type="file" id="file-upload" accept="image/*" style="display: none;">

    <div class="result-toast" id="result-toast">
        <div class="toast-img-box">
            <img id="toast-img" src="" style="width: 100%; height: 100%; object-fit: cover; display: none;">
            <div id="toast-icon-err" style="display: none; height: 100%; width: 100%; align-items: center; justify-content: center; color: #f04747; font-size: 24px;">
                <i class="fas fa-times-circle"></i>
            </div>
        </div>
        <div style="flex: 1;">
            <div id="toast-title" style="font-weight: 800; font-size: 11px; color: #b9bbbe; text-transform: uppercase; letter-spacing: 0.5px;">Notificación</div>
            <div id="toast-name" style="color: #fff; font-size: 14px; font-weight: 500; margin-top: 2px; line-height: 1.2;">Cargando...</div>
        </div>
    </div>

    <canvas id="hidden-canvas" style="display:none;"></canvas>

    <script>
// CONFIGURACIÓN DE ÁREAS DE ESCANEO (ROI) - HARDCODED PARA MÁXIMA ROBUSTEZ
const CARD_CONFIGS = {
    yugioh: {
        width: 348, height: 508,
        rois: {
            name: { x: 10, y: 5, w: 80, h: 12 }, // Porcentajes
            code: { x: 5, y: 88, w: 90, h: 10 }
        }
    },
    pokemon: {
        width: 372, height: 520,
        rois: {
            name: { x: 10, y: 5, w: 80, h: 12 },
            code: { x: 5, y: 88, w: 90, h: 10 }
        }
    }
};

let currentCardType = 'yugioh';
let isScanning = false;
let stream = null;
let detectionBuffer = {};
const DETECTION_THRESHOLD = 3;
let cvReady = false;
let lastRect = null;
let stabilityCount = 0;

// Configurar OpenCV
window.Module = {
    onRuntimeInitialized: () => {
        cvReady = true;
        $('#status-text').text('Motor CV Listo');
    }
};

let ygoSetsCache = null;
async function getYgoSets() {
    if (ygoSetsCache) return ygoSetsCache;
    try {
        const response = await fetch('https://db.ygoprodeck.com/api/v7/cardsets.php');
        ygoSetsCache = await response.json();
    } catch (e) {
        console.warn("Error fetching YGO sets:", e);
        ygoSetsCache = [];
    }
    return ygoSetsCache;
}

let currentUser = null;
let tesseractWorker = null;
let scanTimer = null;

$(document).ready(async function() {
    await checkSession();
    await loadInitialData();
    await initTesseract();
    updateScannerLayout();

    $('#select-game-type').change(async function() {
        currentCardType = $(this).val();
        updateScannerLayout();
    });

    $('#select-target-type').change(function() {
        const type = $(this).val();
        $('#dest-label').text(type === 'album' ? 'Seleccionar Álbum' : 'Seleccionar Deck');
        loadDestinations(type);
    });

    $('#btn-new-dest').click(createNewDestination);

    $('#btn-toggle-scan').click(async function() {
        if (!isScanning) {
            await startCamera();
        } else {
            stopCamera();
        }
    });

    $('#btn-upload').click(function() {
        $('#file-upload').click();
    });

    $('#file-upload').change(handleFileUpload);

    $('#btn-manual').click(async function() {
        const { value: input } = await Swal.fire({
            title: 'Entrada Manual',
            input: 'text',
            inputLabel: 'Introduce el código o nombre de la carta',
            inputPlaceholder: 'LOB-001 / Dark Magician',
            showCancelButton: true,
            confirmButtonColor: '#00d2ff',
            background: '#1a1a2e',
            color: '#fff'
        });

        if (input) {
            const { code, name } = identifyFromText(input);
            await handleFoundCode(code, name || input.trim());
        }
    });
});

async function checkSession() {
    const { data: { session } } = await _supabase.auth.getSession();
    if (session) {
        const { data: user } = await _supabase
            .from('usuarios')
            .select('id, username, email, is_store, role, max_albums, max_pages, max_decks, max_cards_per_deck')
            .eq('id', session.user.id)
            .single();

        if (user) {
            currentUser = user;
            if (currentUser.role !== 'admin') {
                $('#dev-warning').show();
            }
        } else {
            window.location.href = 'admin.html';
        }
    } else {
        window.location.href = 'admin.html';
    }
}

async function loadInitialData() {
    await loadDestinations('album');
}

function updateScannerLayout() {
    const config = CARD_CONFIGS[currentCardType];
    $('#scanner-viewport').css('aspect-ratio', `${config.width}/${config.height}`);
}

async function loadDestinations(type) {
    if (!currentUser) return;
    const table = type === 'album' ? 'albums' : 'decks';
    const { data, error } = await _supabase
        .from(table)
        .select('*')
        .eq('user_id', currentUser.id)
        .order('id', { ascending: true });

    const $select = $('#select-dest');
    $select.empty();
    if (data && data.length > 0) {
        data.forEach(item => {
            $select.append(`<option value="${item.id}">${item.title || item.name}</option>`);
        });
    } else {
        $select.append(`<option value="">No hay ${type}s</option>`);
    }
}

async function createNewDestination() {
    const type = $('#select-target-type').val();
    const table = type === 'album' ? 'albums' : 'decks';
    const limit = type === 'album' ? (currentUser.max_albums || 3) : (currentUser.max_decks || 1);
    const { count } = await _supabase.from(table).select('*', { count: 'exact', head: true }).eq('user_id', currentUser.id);

    if (count >= limit) {
        Swal.fire('Límite alcanzado', `Tu plan actual permite un máximo de ${limit} ${type === 'album' ? 'álbumes' : 'deck'}.`, 'warning');
        return;
    }

    const { value: name } = await Swal.fire({
        title: `Nuevo ${type === 'album' ? 'Álbum' : 'Deck'}`,
        input: 'text',
        inputLabel: `Nombre del ${type}`,
        showCancelButton: true,
        confirmButtonColor: '#00d2ff',
        background: '#1a1a2e',
        color: '#fff'
    });

    if (name) {
        const field = type === 'album' ? 'title' : 'name';
        const { data, error } = await _supabase
            .from(table)
            .insert([{ [field]: name, user_id: currentUser.id }])
            .select();

        if (!error) {
            await loadDestinations(type);
            $('#select-dest').val(data[0].id);
        }
    }
}

async function initTesseract() {
    if (tesseractWorker) return;
    $('#status-text').text('Iniciando OCR...');
    tesseractWorker = await Tesseract.createWorker('eng');
    $('#status-text').text('Motor Listo');
    $('#status-container').addClass('status-ready');
}

async function startCamera() {
    try {
        stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
        });
        const video = document.getElementById('video-preview');
        video.srcObject = stream;

        const track = stream.getVideoTracks()[0];
        if (track && track.applyConstraints) {
            track.applyConstraints({
                advanced: [{ focusMode: 'continuous' }, { exposureMode: 'continuous' }]
            }).catch(e => console.warn("Constraints no soportados:", e));
        }

        video.style.display = 'block';
        $('#file-preview').hide();
        isScanning = true;
        $('#btn-toggle-scan').html('<i class="fas fa-stop"></i> Detener').removeClass('btn-primary').addClass('btn-secondary');
        $('#scanner-viewport').addClass('scanner-active');
        $('#status-text').text('Escaneando...');
        startScanningLoop();
    } catch (err) {
        console.error("Error accessing camera:", err);
        Swal.fire('Error', 'No se pudo acceder a la cámara.', 'error');
    }
}

function stopCamera() {
    if (stream) {
        stream.getTracks().forEach(track => track.stop());
        document.getElementById('video-preview').srcObject = null;
    }
    isScanning = false;
    clearTimeout(scanTimer);
    detectionBuffer = {};
    $('#btn-toggle-scan').html('<i class="fas fa-camera"></i> Cámara').removeClass('btn-secondary').addClass('btn-primary');
    $('#scanner-viewport').removeClass('scanner-active');
    $('#status-text').text('Pausado');
    $('#status-container').removeClass('status-working');
}

async function handleFileUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    stopCamera();
    const reader = new FileReader();
    reader.onload = function(event) {
        const img = new Image();
        img.onload = async function() {
            $('#file-preview').attr('src', event.target.result).show();
            $('#video-preview').hide();
            $('#status-text').text('Procesando Imagen...');
            $('#status-container').addClass('status-working');
            await processImage(img);
        };
        img.src = event.target.result;
    };
    reader.readAsDataURL(file);
}

function startScanningLoop() {
    if (!isScanning) return;
    scanTimer = setTimeout(async () => {
        if (!isScanning) return;
        const video = document.getElementById('video-preview');
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            await captureAndProcessFrame(video);
        }
        startScanningLoop();
    }, 900);
}

async function captureAndProcessFrame(video) {
    if (!cvReady) return;

    const config = CARD_CONFIGS[currentCardType];
    const canvas = document.getElementById('hidden-canvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay-canvas');
    const octx = overlay.getContext('2d');

    // Sincronizar dimensiones del overlay
    if (overlay.width !== video.videoWidth) {
        overlay.width = video.videoWidth;
        overlay.height = video.videoHeight;
    }

    // Dibujar frame actual en canvas oculto para procesar
    canvas.width = 640; // Resolución baja para CV rápido
    canvas.height = 640 * (video.videoHeight / video.videoWidth);
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    const corners = detectCardRectangle(canvas);
    octx.clearRect(0, 0, overlay.width, overlay.height);

    if (corners) {
        // Dibujar máscara dinámica (Snap)
        drawDynamicMask(octx, corners, video.videoWidth / canvas.width);

        // Estabilidad: Si el rectángulo se mueve poco por 5 frames, disparamos OCR
        if (checkStability(corners)) {
            stabilityCount++;
            if (stabilityCount >= 5) {
                $('#status-container').addClass('status-working');
                const warpedCard = extractWarpedCard(video, corners, video.videoWidth / canvas.width);
                if (warpedCard) {
                    await processImageMulti(warpedCard, config.rois);
                }
                stabilityCount = 0;
            }
        } else {
            stabilityCount = 0;
        }
    } else {
        stabilityCount = 0;
    }
}

function detectCardRectangle(canvas) {
    let src = cv.imread(canvas);
    let dst = new cv.Mat();
    cv.cvtColor(src, dst, cv.COLOR_RGBA2GRAY);
    cv.GaussianBlur(dst, dst, new cv.Size(5, 5), 0);
    cv.Canny(dst, dst, 75, 200);
    cv.dilate(dst, dst, cv.Mat.ones(3, 3, cv.CV_8U));

    let contours = new cv.MatVector();
    let hierarchy = new cv.Mat();
    cv.findContours(dst, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

    let maxArea = 0;
    let cardContour = null;

    for (let i = 0; i < contours.size(); ++i) {
        let cnt = contours.get(i);
        let area = cv.contourArea(cnt);
        if (area > 10000) {
            let peri = cv.arcLength(cnt, true);
            let approx = new cv.Mat();
            cv.approxPolyDP(cnt, approx, 0.02 * peri, true);
            if (approx.rows === 4 && area > maxArea) {
                maxArea = area;
                cardContour = approx.clone();
            }
            approx.delete();
        }
    }

    let result = null;
    if (cardContour) {
        let pts = [];
        for (let i = 0; i < 4; i++) pts.push({ x: cardContour.data32S[i * 2], y: cardContour.data32S[i * 2 + 1] });
        // Ordenar puntos: TL, TR, BR, BL
        pts.sort((a, b) => a.y - b.y);
        let top = pts.slice(0, 2).sort((a, b) => a.x - b.x);
        let bottom = pts.slice(2, 4).sort((a, b) => a.x - b.x);
        result = [top[0], top[1], bottom[1], bottom[0]];
        cardContour.delete();
    }

    src.delete(); dst.delete(); contours.delete(); hierarchy.delete();
    return result;
}

function drawDynamicMask(ctx, pts, scale) {
    ctx.strokeStyle = '#00d2ff';
    ctx.lineWidth = 5;
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(pts[0].x * scale, pts[0].y * scale);
    for(let i=1; i<4; i++) ctx.lineTo(pts[i].x * scale, pts[i].y * scale);
    ctx.closePath();
    ctx.stroke();

    // Efecto de brillo en las esquinas
    ctx.fillStyle = '#fff';
    pts.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x * scale, p.y * scale, 8, 0, Math.PI * 2);
        ctx.fill();
    });
}

function checkStability(pts) {
    if (!lastRect) { lastRect = pts; return false; }
    let diff = 0;
    for (let i = 0; i < 4; i++) {
        diff += Math.abs(pts[i].x - lastRect[i].x) + Math.abs(pts[i].y - lastRect[i].y);
    }
    lastRect = pts;
    return diff < 40; // Umbral de estabilidad (acumulado de 4 puntos)
}

function extractWarpedCard(video, pts, scale) {
    const config = CARD_CONFIGS[currentCardType];
    let src = cv.imread(video);
    let dst = new cv.Mat();
    let dsize = new cv.Size(config.width * 2, config.height * 2);

    let srcCoords = cv.matFromArray(4, 1, cv.CV_32FC2, [
        pts[0].x * scale, pts[0].y * scale,
        pts[1].x * scale, pts[1].y * scale,
        pts[2].x * scale, pts[2].y * scale,
        pts[3].x * scale, pts[3].y * scale
    ]);

    let dstCoords = cv.matFromArray(4, 1, cv.CV_32FC2, [
        0, 0,
        dsize.width, 0,
        dsize.width, dsize.height,
        0, dsize.height
    ]);

    let M = cv.getPerspectiveTransform(srcCoords, dstCoords);
    cv.warpPerspective(src, dst, M, dsize);

    let canvas = document.createElement('canvas');
    cv.imshow(canvas, dst);

    src.delete(); dst.delete(); M.delete(); srcCoords.delete(); dstCoords.delete();
    return canvas;
}

async function processImageMulti(sourceCanvas, rois, passIdx = 0) {
    const thresholds = [130, 160, 100]; // Normal, Darker, Lighter
    const threshold = thresholds[passIdx];

    try {
        let nameText = "", codeText = "";
        let maxConf = 0;

        if (rois.name) {
            const nameCanvas = extractAndPreprocessROI(sourceCanvas, rois.name, threshold);
            await tesseractWorker.setParameters({ tessedit_char_whitelist: '' });
            const { data: { text, confidence } } = await tesseractWorker.recognize(nameCanvas);
            nameText = text.trim();
            maxConf = Math.max(maxConf, confidence);
        }

        if (rois.code) {
            const codeCanvas = extractAndPreprocessROI(sourceCanvas, rois.code, threshold);
            await tesseractWorker.setParameters({
                tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789/-',
                tessjs_create_hocr: '0',
                tessjs_create_tsv: '0'
            });
            const { data: { text, confidence } } = await tesseractWorker.recognize(codeCanvas);
            codeText = text.trim();
            maxConf = Math.max(maxConf, confidence);
        }

        const combinedText = `${nameText}\n${codeText}`;
        const { code } = identifyFromText(combinedText);

        // Si encontramos un código válido o la confianza es decente, procesamos
        if (code || (maxConf > 60)) {
            await processDetectedText(combinedText);
        } else if (passIdx < thresholds.length - 1 && isScanning && !$('#file-preview').is(':visible')) {
            // Reintento con el siguiente umbral si no hay resultados claros
            await processImageMulti(sourceCanvas, rois, passIdx + 1);
        } else {
            await processDetectedText(combinedText);
        }
    } catch (err) {
        console.error("OCR Multi-Pass Error:", err);
    }
}

function extractAndPreprocessROI(sourceCanvas, roi, threshold) {
    const upscale = 4;
    const procCanvas = document.createElement('canvas');
    const rx = (roi.x / 100) * sourceCanvas.width;
    const ry = (roi.y / 100) * sourceCanvas.height;
    const rw = (roi.w / 100) * sourceCanvas.width;
    const rh = (roi.h / 100) * sourceCanvas.height;

    procCanvas.width = rw * upscale;
    procCanvas.height = rh * upscale;
    const pctx = procCanvas.getContext('2d');
    pctx.imageSmoothingEnabled = true;
    pctx.imageSmoothingQuality = 'high';
    pctx.drawImage(sourceCanvas, rx, ry, rw, rh, 0, 0, procCanvas.width, procCanvas.height);
    preprocessROI(pctx, 0, 0, procCanvas.width, procCanvas.height, threshold);
    return procCanvas;
}

function preprocessROI(ctx, x, y, w, h, threshold) {
    const imageData = ctx.getImageData(x, y, w, h);
    const data = imageData.data;
    const contrastFactor = 3.2; // Más agresivo para compensar borrosidad
    for (let i = 0; i < data.length; i += 4) {
        let r = data[i], g = data[i+1], b = data[i+2];
        let v = 0.2126 * r + 0.7152 * g + 0.0722 * b;

        // Simular enfoque (High-pass) aumentando la diferencia con el gris medio
        v = contrastFactor * (v - 128) + 128;

        // Binarización nítida
        v = v > threshold ? 255 : 0;

        data[i] = data[i+1] = data[i+2] = v;
    }
    ctx.putImageData(imageData, x, y);
}

async function processImage(imageOrCanvas) {
    try {
        await tesseractWorker.setParameters({ tessedit_char_whitelist: '' });
        const { data: { text } } = await tesseractWorker.recognize(imageOrCanvas);
        await processDetectedText(text);
    } catch (e) { console.error(e); }
}

function smartNormalize(s, forceNumeric = false) {
    if (!s) return "";
    const digitCount = (s.match(/[0-9]/g) || []).length;
    const letterCount = (s.match(/[A-Z]/g) || []).length;
    if (forceNumeric || digitCount >= letterCount) {
        return s.replace(/[OQDU]/g, '0').replace(/[ILJT]/g, '1').replace(/Z/g, '2').replace(/E/g, '3').replace(/A/g, '4').replace(/S/g, '5').replace(/G/g, '6').replace(/B/g, '8').replace(/\s/g, '');
    }
    return s.replace(/\s/g, '');
}

function identifyFromText(text) {
    const lines = text.toUpperCase().split('\n');
    let results = [];
    let potentialName = "";

    // El nombre suele estar en la primera línea del bloque superior
    if (lines[0] && lines[0].length > 3 && !/\d/.test(lines[0])) {
        potentialName = lines[0].trim();
    }

    for (let line of lines) {
        line = line.trim(); if (!line) continue;

        // 1. Yu-Gi-Oh Passcode (8 dígitos)
        const regexPasscode = /\b([0-9OIZSGEABDUQ]{8})\b/;
        const matchPass = line.match(regexPasscode);
        if (matchPass) {
            const code = smartNormalize(matchPass[1], true);
            if (code.length === 8) results.push({ code: code, type: 'yugioh', weight: 10 });
        }

        // 2. Yu-Gi-Oh Set Code (e.g. LOB-EN001)
        const regexYG = /\b([A-Z0-9]{3,6})[\-\s]([A-Z0-9]{3,8})\b/i;
        const matchYG = line.match(regexYG);
        if (matchYG) {
            let prefix = matchYG[1], suffix = matchYG[2];
            let normalizedID = smartNormalize(suffix, true);
            results.push({ code: prefix + '-' + normalizedID, type: 'yugioh', weight: 8 });
        }

        // 3. Pokémon Fraction (e.g. 123/456)
        const regexPK_F = /\b([0-9OIZSGEAB]{1,5})\/([0-9OIZSGEAB]{1,5})\b/i;
        const matchPK_F = line.match(regexPK_F);
        if (matchPK_F) {
            let n1 = smartNormalize(matchPK_F[1], true), n2 = smartNormalize(matchPK_F[2], true);
            results.push({ code: n1 + '/' + n2, type: 'pokemon', weight: 9 });
        }

        // 4. Pokémon Promo/Set (e.g. SWSH123, BRS045)
        const regexPK_P = /\b([A-Z]{2,5})[\s]?([0-9OIZSGEAB]{2,6})\b/i;
        const matchPK_P = line.match(regexPK_P);
        if (matchPK_P) {
            let prefix = matchPK_P[1];
            const blacklist = ['BASIC', 'STAGE', 'HP', 'NO', 'DNA', 'TYPE', 'CARD', 'TEAM', 'ITEM'];
            if (!blacklist.includes(prefix)) {
                let num = smartNormalize(matchPK_P[2], true);
                results.push({ code: prefix + num, type: 'pokemon', weight: 7 });
            }
        }
    }

    if (results.length > 0) {
        results.sort((a, b) => b.weight - a.weight);
        return { ...results[0], name: potentialName };
    }
    return { code: null, type: currentCardType, name: potentialName };
}

async function processDetectedText(text) {
    const { code, type, name } = identifyFromText(text);
    if (code || (name && name.length > 4)) {
        const identifier = code || name;
        if (!$('#file-preview').is(':visible')) {
            if (!detectionBuffer[identifier]) { detectionBuffer = {}; detectionBuffer[identifier] = 1; }
            else { detectionBuffer[identifier]++; }
            const count = detectionBuffer[identifier];
            $('#detected-code').text(`${identifier.substring(0, 15)}... (${count}/${DETECTION_THRESHOLD})`);
            if (count < DETECTION_THRESHOLD) { $('#status-text').text(`Verificando... [${count}/${DETECTION_THRESHOLD}]`); return; }
            detectionBuffer = {}; $('#status-text').text('¡Confirmado!');
        }
        $('#detected-code').text(identifier);
        const success = await handleFoundCode(code, name, type);
        if (!success && code) { showManualPrompt(code, text); }
    } else {
        // No valid card data found, be silent to avoid "garbage" detections
        $('#detected-code').text('');
        $('#status-text').text(isScanning ? 'Escaneando...' : 'Listo');
        $('#status-container').removeClass('status-working');

        // Only show manual prompt if it's an intentional upload that failed
        if ($('#file-preview').is(':visible') && text.trim().length > 0) {
            showManualPrompt(null, text);
        }
    }
}

async function showManualPrompt(failedCode, rawText) {
    if (window.isPrompting) return;
    window.isPrompting = true;
    const title = failedCode ? `No se encontró ${failedCode}` : 'Código no detectado';
    const msg = failedCode ? 'El código parece correcto pero no está en la base de datos. ¿Deseas corregirlo?' : 'No pudimos encontrar un código. ¿Deseas ingresarlo manualmente?';
    const { isConfirmed } = await Swal.fire({ title: title, text: msg, icon: 'question', showCancelButton: true, confirmButtonText: 'Sí, editar', cancelButtonText: 'No' });
    window.isPrompting = false;
    if (isConfirmed) { promptCorrection(failedCode || rawText.substring(0, 20)); }
}

async function promptCorrection(detectedText) {
    const { value: correctedCode } = await Swal.fire({ title: 'Corregir Código', input: 'text', inputValue: detectedText, inputLabel: 'Introduce el código correcto:', showCancelButton: true, confirmButtonColor: '#00d2ff', background: '#1a1a2e', color: '#fff' });
    if (correctedCode) { await handleFoundCode(correctedCode.toUpperCase().trim()); }
}

async function handleFoundCode(code, name, type = null) {
    const identifier = code || name;
    if (window.lastProcessedCode === identifier) return true;
    window.lastProcessedCode = identifier;
    $('#status-text').text('Buscando...');
    const cardData = await fetchCardData(code, name, type || currentCardType);
    if (cardData) {
        const saved = await saveCard(cardData);
        if (saved) { showToast('success', 'Carta Añadida', cardData.name, cardData.image_url); setTimeout(() => { window.lastProcessedCode = null; }, 4000); return true; }
    }
    setTimeout(() => { window.lastProcessedCode = null; }, 2000);
    return false;
}

async function fetchCardData(code, name, type) {
    try {
        if (type === 'yugioh') {
            let data = null;
            const cleanCode = code ? code.toUpperCase().replace(/\s/g, '-').replace(/-{2,}/g, '-') : null;
            if (cleanCode && /^\d{5,10}$/.test(cleanCode)) {
                const res = await fetch(`https://db.ygoprodeck.com/api/v7/cardinfo.php?id=${cleanCode}`);
                data = await res.json();
            } else if (cleanCode) {
                const setMatch = cleanCode.match(/^([A-Z0-9]{3,6})-([A-Z0-9]{3,8})$/);
                if (setMatch) {
                    const prefix = setMatch[1];
                    const sets = await getYgoSets();
                    const setObj = sets.find(s => s.set_code.toUpperCase() === prefix);
                    if (setObj) {
                        const res = await fetch(`https://db.ygoprodeck.com/api/v7/cardinfo.php?cardset=${encodeURIComponent(setObj.set_name)}`);
                        const fullSetData = await res.json();
                        if (fullSetData.data) {
                            const cardMatch = fullSetData.data.find(c => c.card_sets && c.card_sets.some(s => s.set_code.toUpperCase() === cleanCode));
                            if (cardMatch) data = { data: [cardMatch] };
                        }
                    }
                }
            }
            if (cleanCode && (!data || !data.data)) { const res = await fetch(`https://db.ygoprodeck.com/api/v7/cardinfo.php?cardset=${encodeURIComponent(cleanCode)}`); data = await res.json(); }
            if (name && (!data || !data.data)) { const res = await fetch(`https://db.ygoprodeck.com/api/v7/cardinfo.php?fname=${encodeURIComponent(name)}`); data = await res.json(); }
            if (data && data.data && data.data.length > 0) {
                const card = data.data[0], setInfo = card.card_sets?.find(s => s.set_code.toUpperCase() === cleanCode) || card.card_sets?.[0];
                return { name: card.name, image_url: card.card_images[0].image_url, rarity: setInfo?.set_rarity || '', expansion: setInfo?.set_name || '', type: 'yugioh' };
            }
        } else {
            if (code) {
                let number, total;
                if (code.includes('/')) {
                    [number, total] = code.split('/');
                    const query = `number:${number} set.printedTotal:${total}`;
                    const res = await fetch(`https://api.pokemontcg.io/v2/cards?q=${encodeURIComponent(query)}`);
                    const data = await res.json();
                    if (data.data && data.data.length > 0) return formatPokemonCard(data.data[0]);
                }
                number = code.includes('/') ? code.split('/')[0] : code;
                const resNum = await fetch(`https://api.pokemontcg.io/v2/cards?q=number:${number}`);
                const dataNum = await resNum.json();
                if (dataNum.data && dataNum.data.length > 0) {
                    if (code.includes('/')) { const bestMatch = dataNum.data.find(c => c.set.printedTotal == code.split('/')[1]) || dataNum.data[0]; return formatPokemonCard(bestMatch); }
                    return formatPokemonCard(dataNum.data[0]);
                }
            }
            if (name) { const resName = await fetch(`https://api.pokemontcg.io/v2/cards?q=name:"${encodeURIComponent(name)}"`); const dataName = await resName.json(); if (dataName.data && dataName.data.length > 0) return formatPokemonCard(dataName.data[0]); }
            const langs = ['en', 'es', 'ja'];
            for (const lang of langs) {
                try {
                    const resFb = await fetch(`https://api.tcgdex.net/v2/${lang}/cards/${code.toLowerCase()}`);
                    if (resFb.ok) { const card = await resFb.json(); return { name: card.name, image_url: `${card.image}/high.webp`, rarity: card.rarity || '', expansion: card.set.name || '', type: 'pokemon' }; }
                } catch (e) {}
            }
        }
    } catch (err) {}
    return null;
}

function formatPokemonCard(card) { return { name: card.name, image_url: card.images.large, rarity: card.rarity || '', expansion: card.set.name || '', type: 'pokemon' }; }

async function saveCard(cardData) {
    const targetType = $('#select-target-type').val(), destId = $('#select-dest').val();
    if (!destId) return false;
    try {
        if (targetType === 'album') {
            let { data: pages } = await _supabase.from('pages').select('id, page_index').eq('album_id', destId).order('page_index', { ascending: true });
            if (!pages || pages.length === 0) { const { data: newPage } = await _supabase.from('pages').insert([{ album_id: destId, page_index: 0 }]).select(); pages = newPage; }
            const { data: allSlots } = await _supabase.from('card_slots').select('page_id, slot_index').in('page_id', pages.map(p => p.id));
            let saved = false;
            for (const page of pages) {
                const occupied = (allSlots || []).filter(s => s.page_id === page.id).map(s => s.slot_index);
                for (let i = 0; i < 9; i++) {
                    if (!occupied.includes(i)) {
                        await _supabase.from('card_slots').insert([{ page_id: page.id, slot_index: i, name: cardData.name, image_url: cardData.image_url, rarity: cardData.rarity, expansion: cardData.expansion, condition: 'M', quantity: 1 }]);
                        saved = true; break;
                    }
                }
                if (saved) break;
            }
            if (!saved) {
                if (pages.length >= (currentUser.max_pages || 5)) { Swal.fire('Límite alcanzado', `Has alcanzado el límite de ${currentUser.max_pages || 5} páginas en este álbum.`, 'warning'); return false; }
                const lastIdx = pages[pages.length - 1].page_index;
                const { data: nPage } = await _supabase.from('pages').insert([{ album_id: destId, page_index: lastIdx + 1 }]).select();
                await _supabase.from('card_slots').insert([{ page_id: nPage[0].id, slot_index: 0, name: cardData.name, image_url: cardData.image_url, rarity: cardData.rarity, expansion: cardData.expansion, condition: 'M', quantity: 1 }]);
            }
            return true;
        } else {
            const { count } = await _supabase.from('deck_cards').select('*', { count: 'exact', head: true }).eq('deck_id', destId);
            if (count >= (currentUser.max_cards_per_deck || 60)) { Swal.fire('Límite alcanzado', `Este deck ya tiene el máximo de ${currentUser.max_cards_per_deck || 60} cartas permitidas.`, 'warning'); return false; }
            await _supabase.from('deck_cards').insert([{ deck_id: destId, name: cardData.name, image_url: cardData.image_url, rarity: cardData.rarity, expansion: cardData.expansion, quantity: 1 }]);
            return true;
        }
    } catch (err) { return false; }
}

function showToast(type, title, message, imageUrl = null) {
    const $toast = $('#result-toast'); $toast.removeClass('success error active');
    $('#toast-title').text(title); $('#toast-name').text(message);
    if (imageUrl) { $('#toast-img').attr('src', imageUrl).show(); $('#toast-icon-err').hide(); }
    else { $('#toast-img').hide(); $('#toast-icon-err').css('display', 'flex'); }
    $toast.addClass(type).addClass('active'); setTimeout(() => $toast.removeClass('active'), 3000);
}
